name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'habitikami-android-and-widgets/**'
  pull_request:
    branches: [main]
    paths:
      - 'habitikami-android-and-widgets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: habitikami-android-and-widgets

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitikami-debug-apk
          path: habitikami-android-and-widgets/app/build/outputs/apk/debug/*.apk
          retention-days: 30
