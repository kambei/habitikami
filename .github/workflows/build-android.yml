name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'habitikami-android-and-widgets/**'
  pull_request:
    branches: [main]
    paths:
      - 'habitikami-android-and-widgets/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: habitikami-android-and-widgets

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/habitikami.apk

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitikami-debug-apk
          path: habitikami-android-and-widgets/app/build/outputs/apk/debug/habitikami.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: Habitikami ${{ steps.version.outputs.name }}
          files: habitikami-android-and-widgets/app/build/outputs/apk/debug/habitikami.apk
          generate_release_notes: true
