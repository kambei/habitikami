<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <defs>
    <linearGradient id="abg1" x1="0" y1="0" x2="480" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#1a1028"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" rx="12" fill="url(#abg1)"/>
  <!-- Browser bar -->
  <rect x="0" y="0" width="480" height="36" rx="12" fill="#2a2a4a"/>
  <rect x="0" y="12" width="480" height="24" fill="#2a2a4a"/>
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="54" cy="18" r="5" fill="#28c840"/>
  <rect x="80" y="9" width="320" height="18" rx="9" fill="#1a1a2e"/>
  <text x="120" y="22" font-family="monospace" font-size="10" fill="#c084fc">console.anthropic.com</text>
  <!-- Sidebar -->
  <rect x="0" y="36" width="140" height="164" fill="#1a1028"/>
  <rect x="0" y="180" width="140" height="20" fill="#1a1028" rx="0"/>
  <!-- Sidebar items -->
  <text x="20" y="65" font-family="Arial, sans-serif" font-size="11" fill="#888">Dashboard</text>
  <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#888">Workbench</text>
  <!-- API Keys highlighted -->
  <rect x="8" y="98" width="124" height="26" rx="6" fill="#c084fc" opacity="0.15"/>
  <text x="20" y="116" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c084fc">🔑 API Keys</text>
  <!-- Arrow -->
  <path d="M140 111 L155 111" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#aarr1)"/>
  <text x="20" y="140" font-family="Arial, sans-serif" font-size="11" fill="#888">Settings</text>
  <text x="20" y="165" font-family="Arial, sans-serif" font-size="11" fill="#888">Billing</text>
  <!-- Main content -->
  <text x="180" y="70" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">API Keys</text>
  <text x="180" y="90" font-family="Arial, sans-serif" font-size="11" fill="#888">Manage your API keys for accessing Claude</text>
  <rect x="180" y="105" width="270" height="40" rx="8" fill="#2a2a4a" stroke="#444" stroke-width="0.5"/>
  <text x="270" y="130" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">No API keys yet</text>
  <defs>
    <marker id="aarr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b"/>
    </marker>
  </defs>
  <!-- Step number -->
  <circle cx="440" cy="55" r="16" fill="#c084fc"/>
  <text x="440" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1</text>
</svg>