<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <defs>
    <linearGradient id="abg3" x1="0" y1="0" x2="480" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#1a1028"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" rx="12" fill="url(#abg3)"/>
  <!-- Modal overlay -->
  <rect width="480" height="200" rx="12" fill="black" opacity="0.4"/>
  <!-- Modal -->
  <rect x="60" y="20" width="360" height="160" rx="12" fill="#2a2a4a" stroke="#444" stroke-width="1"/>
  <!-- Success icon -->
  <circle cx="240" cy="50" r="14" fill="#28c840" opacity="0.2"/>
  <text x="240" y="55" font-family="Arial, sans-serif" font-size="16" fill="#28c840" text-anchor="middle">✓</text>
  <!-- Title -->
  <text x="240" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0" text-anchor="middle">Your new API key</text>
  <text x="240" y="95" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">Copy it now — you won't be able to see it again!</text>
  <!-- Key display -->
  <rect x="90" y="108" width="300" height="32" rx="6" fill="#1a1a2e" stroke="#c084fc" stroke-width="1.5"/>
  <text x="105" y="129" font-family="monospace" font-size="10" fill="#c084fc">sk-ant-api03-xK7m...9pLq</text>
  <!-- Copy button -->
  <rect x="340" y="112" width="40" height="24" rx="4" fill="#c084fc"/>
  <text x="360" y="128" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Copy</text>
  <!-- Arrow to copy -->
  <path d="M315 124 L335 124" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#aarr3)"/>
  <!-- Warning -->
  <text x="240" y="162" font-family="Arial, sans-serif" font-size="9" fill="#ff6b6b" text-anchor="middle">⚠ Store this key securely. It won't be shown again.</text>
  <defs>
    <marker id="aarr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b"/>
    </marker>
  </defs>
  <!-- Step number -->
  <circle cx="440" cy="40" r="16" fill="#c084fc"/>
  <text x="440" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
</svg>