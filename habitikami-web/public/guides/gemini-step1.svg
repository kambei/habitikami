<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="200" rx="12" fill="url(#bg)"/>
  <!-- Browser bar -->
  <rect x="0" y="0" width="480" height="36" rx="12" fill="#2a2a4a"/>
  <rect x="0" y="12" width="480" height="24" fill="#2a2a4a"/>
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="54" cy="18" r="5" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="80" y="9" width="320" height="18" rx="9" fill="#1a1a2e"/>
  <text x="120" y="22" font-family="monospace" font-size="10" fill="#4fc3f7">aistudio.google.com/app/apikey</text>
  <!-- Content area -->
  <!-- Google AI Studio logo area -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">Google AI Studio</text>
  <text x="30" y="88" font-family="Arial, sans-serif" font-size="11" fill="#888">API Keys</text>
  <!-- Key icon -->
  <rect x="30" y="105" width="420" height="50" rx="8" fill="#2a2a4a" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="200" y="135" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle">Your API keys will appear here</text>
  <!-- Create API Key button - highlighted -->
  <rect x="310" y="160" width="140" height="32" rx="16" fill="#4285f4"/>
  <text x="380" y="181" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">+ Create API Key</text>
  <!-- Arrow pointing to button -->
  <path d="M280 176 L305 176" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b"/>
    </marker>
  </defs>
  <!-- Step number -->
  <circle cx="455" cy="55" r="16" fill="#4285f4"/>
  <text x="455" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1</text>
</svg>