<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="480" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" rx="12" fill="url(#bg3)"/>
  <!-- Modal overlay -->
  <rect width="480" height="200" rx="12" fill="black" opacity="0.4"/>
  <!-- Modal dialog -->
  <rect x="70" y="25" width="340" height="150" rx="12" fill="#2a2a4a" stroke="#444" stroke-width="1"/>
  <!-- Success icon -->
  <circle cx="240" cy="55" r="14" fill="#28c840" opacity="0.2"/>
  <text x="240" y="60" font-family="Arial, sans-serif" font-size="16" fill="#28c840" text-anchor="middle">✓</text>
  <!-- Title -->
  <text x="240" y="82" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0" text-anchor="middle">API Key created!</text>
  <!-- Key display -->
  <rect x="100" y="95" width="280" height="32" rx="6" fill="#1a1a2e" stroke="#28c840" stroke-width="1.5"/>
  <text x="115" y="116" font-family="monospace" font-size="11" fill="#4fc3f7">AIzaSyB4k...mN7xPq2wR</text>
  <!-- Copy button -->
  <rect x="330" y="99" width="40" height="24" rx="4" fill="#4285f4"/>
  <text x="350" y="115" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Copy</text>
  <!-- Arrow to copy -->
  <path d="M305 111 L325 111" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arr3)"/>
  <!-- Instruction -->
  <text x="240" y="152" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">Copy this key and paste it in Habitikami</text>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b"/>
    </marker>
  </defs>
  <!-- Step number -->
  <circle cx="440" cy="45" r="16" fill="#4285f4"/>
  <text x="440" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
</svg>